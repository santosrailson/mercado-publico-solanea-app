services:
  db:
    image: postgres:16-alpine
    container_name: mercado-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mercado
      POSTGRES_USER: mercado
      POSTGRES_PASSWORD: mercado123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mercado-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mercado -d mercado"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mercado-backend
    restart: unless-stopped
    ports:
      - "8007:8007"
    environment:
      - DATABASE_URL=postgresql://mercado:mercado123@db:5432/mercado
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - CORS_ORIGINS=["http://localhost:5173", "http://localhost:3000", "http://frontend"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - mercado-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mercado-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - mercado-network

volumes:
  postgres_data:

networks:
  mercado-network:
    driver: bridge
